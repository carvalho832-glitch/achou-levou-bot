<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achou Levou Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
      padding: 20px;
    }

    .wrap {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #111827;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,.3);
    }

    h1 {
      text-align: center;
      color: #22c55e;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      margin-top: 14px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .green {
      background: #16a34a;
      color: #fff;
    }

    .orange {
      background: #f59e0b;
      color: #111;
    }

    .red {
      background: #dc2626;
      color: #fff;
    }

    .secondary {
      background: #1e293b;
      color: #fff;
    }

    .groupBox {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 14px;
      border: 1px solid #334155;
    }

    .grupo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 18px;
    }

    .grupo input {
      width: auto;
      transform: scale(1.4);
    }

    #mensagem {
      white-space: pre-wrap;
      background: #020617;
      border: 1px dashed #334155;
      border-radius: 14px;
      padding: 15px;
      margin-top: 15px;
      color: #e5e7eb;
    }

    #statusEnvio {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Achou Levou 🚀</h1>

    <div class="card">
      <h2>Nova oferta</h2>

      <label>Link do produto / afiliado</label>
      <input id="link" placeholder="Cole aqui seu link" />

      <label>Produto</label>
      <input id="titulo" placeholder="Ex: Grill Top Bpe01" />

      <label>Preço atual</label>
      <input id="preco" placeholder="Ex: R$229,90" />

      <label>Preço antigo opcional</label>
      <input id="precoAntigo" placeholder="Ex: R$399,90" />

      <label>Cupom opcional</label>
      <input id="cupom" placeholder="Ex: DESCONTO10" />

      <label>URL da imagem opcional</label>
      <input id="imagem" placeholder="https://..." />

      <label>Descrição curta e vendedora</label>
      <textarea id="descricao" placeholder="Ex: Grill potente, compacto e ideal para cozinha"></textarea>

      <div class="groupBox">
        <strong>Enviar para:</strong>

        <label class="grupo">
          <input type="checkbox" value="achouLevou" />
          Achou Levou
        </label>

        <label class="grupo">
          <input type="checkbox" value="grupoTeste" />
          Grupo teste
        </label>
      </div>

      <button class="green" onclick="gerarMensagem()">Gerar oferta</button>
      <button class="secondary" onclick="copiarTexto()">Copiar texto</button>
      <button class="orange" onclick="abrirWhatsapp()">Abrir WhatsApp</button>
      <button class="red" onclick="enviarParaGrupos(event)">Enviar para grupos</button>

      <p id="statusEnvio">Marque um ou mais grupos. Deixe o bot.cjs rodando na VPS.</p>
    </div>

    <div class="card">
      <h2>Mensagem pronta</h2>
      <div id="mensagem"></div>
    </div>
  </div>

  <script>
    const API_BOT = "http://35.239.226.38:3001";

    const $ = (id) => document.getElementById(id);

    function safe(valor) {
      return valor && valor.trim().length > 0;
    }

    function gruposSelecionados() {
      return Array.from(document.querySelectorAll('.grupo input:checked'))
        .map(input => input.value);
    }

    function nomesGruposSelecionados() {
      return Array.from(document.querySelectorAll('.grupo input:checked'))
        .map(input => input.parentElement.textContent.trim());
    }

    function gerarMensagem() {
      const titulo = $("titulo").value.trim();
      const preco = $("preco").value.trim();
      const precoAntigo = $("precoAntigo").value.trim();
      const cupom = $("cupom").value.trim();
      const link = $("link").value.trim();
      const descricao = $("descricao").value.trim();

      let msg = 🔥 *ACHOU LEVOU!* 🔥\n\n;

      if (titulo) msg += 🛒 *${titulo}*\n\n;
      if (descricao) msg += ${descricao}\n\n;
      if (precoAntigo) msg += ❌ De: ${precoAntigo}\n;
      if (preco) msg += ✅ *Por: ${preco}*\n;
      if (cupom) msg += 🎟️ Cupom: *${cupom}*\n;

      msg += \n👇 Comprar agora:\n${link};

      $("mensagem").textContent = msg;
      return msg;
    }

    async function copiarTexto() {
      const msg = gerarMensagem();

      try {
        await navigator.clipboard.writeText(msg);
        alert("Mensagem copiada ✅");
      } catch (e) {
        alert("Não consegui copiar. Copie manualmente.");
      }
    }

    function abrirWhatsapp() {
      const msg = encodeURIComponent(gerarMensagem());
      window.open(https://wa.me/?text=${msg}, "_blank");
    }

    async function enviarParaGrupos(ev) {
      gerarMensagem();

      const mensagem = $("mensagem").textContent;
      const grupos = gruposSelecionados();
      const nomes = nomesGruposSelecionados();
      const btn = ev?.target;
      const old = btn?.textContent;

      if (!grupos.length) {
        alert("Selecione pelo menos um grupo.");
        return;
      }

      if (!safe($("link").value)) {
        alert("Confira o link antes de enviar.");
        return;
      }

      if (!confirm(Enviar essa oferta para: ${nomes.join(", ")}?)) {
        return;
      }

      if (btn) {
        btn.textContent = "Enviando...";
        btn.disabled = true;
      }

      $("statusEnvio").textContent = "Enviando para os grupos selecionados...";

      try {
        const res = await fetch(${API_BOT}/enviar, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            mensagem,
            grupos
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          console.log(data);
          alert("Não consegui enviar. Veja o terminal da VPS.");
          $("statusEnvio").textContent = "Erro ao enviar.";
          return;
        }

        $("statusEnvio").textContent = Mensagem enviada ✅ (${nomes.join(", ")});
        alert("Mensagem enviada ✅");

      } catch (err) {
        console.error(err);
        alert("Não consegui enviar. Deixe o bot.cjs rodando no terminal e tente novamente.");
        $("statusEnvio").textContent = "Erro de conexão com o bot.";
      } finally {
        if (btn) {
          btn.textContent = old || "Enviar para grupos";
          btn.disabled = false;
        }
      }
    }
  </script>
</body>
</html>
